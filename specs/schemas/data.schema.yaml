version: 2

bar_data:
  required_fields:
    - date
    - open_price
    - high_price
    - low_price
    - close_price
    - volume
    - amount
    - code

  optional_fields:
    - name                # 股票名称
    - pct_chg             # 涨跌幅
    - turn                # 换手率
    - total_mv            # 总市值（万元）
    - pe_ttm              # 市盈率 TTM
    - pb                  # 市净率

  dtypes:
    date: datetime64[ns]
    open_price: float64
    high_price: float64
    low_price: float64
    close_price: float64
    volume: float64
    amount: float64
    code: string

  compression: snappy

  adjust_type:
    - none
    - qfq
    - hfq

  storage:
    raw: ./data/raw/
    processed: ./data/processed/
