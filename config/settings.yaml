      volatility: 20
      volume_price_corr: 10
      short_reversal: 6
indicators:
  ma:
    periods:
    - 5
    - 10
    - 20
    - 60
  rsi:
    period: 14
    oversold: 30
    overbought: 70
  macd:
    fast_period: 12
    slow_period: 26
    signal_period: 9
  bollinger_bands:
    period: 20
    std_dev: 2.0
backtest:
  initial_cash: 1000000.0
  commission_rate: 0.0003
  stamp_duty_rate: 0.001
  min_commission: 5.0
  trading_days_per_year: 252
web:
  control_panel:
    initial_cash:
      min_value: 10000
      max_value: 100000000
      default_value: 1000000
      step: 10000
    ma_short:
      min_value: 3
      max_value: 20
      default_value: 5
    ma_long:
      min_value: 10
      max_value: 60
      default_value: 20
    stop_loss:
      min_value: -20
      max_value: -1
      default_value: -8
    take_profit:
      min_value: 5
      max_value: 50
      default_value: 20
    default_start_date: '2024-01-01'
    default_end_date: '2024-03-31'
notification:
