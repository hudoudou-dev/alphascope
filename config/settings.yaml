    limit_down_max: 3
    limit_stat_period: 60
    max_up_threshold: 10.0
    max_down_threshold: -10.0
    initial_cash: 1000000.0
    max_positions: 6
    top_n: 20
    min_score_threshold: 50.0
    cooldown_days: 5
    max_trades_per_day: 5
    max_buy_per_day: 2
    max_sell_per_day: 5
    trend_weight: 35.0
    momentum_weight: 25.0
    volume_price_weight: 25.0
    quality_weight: 15.0
    enable_risk_control: true
    enable_st_filter: true
    enable_limit_filter: true
    cross_sectional_enabled: true
    regime_enabled: true
  sell_signals:
    # ===== 最短持有期（除硬止损外，持有不足此天数不触发其他卖出信号）=====
    min_holding_days: 10
    # ===== 硬止损 =====
    hard_stop_loss_pct: -12.0
    # ===== 保底固定止盈 =====
    take_profit_backstop_pct: 80.0
    # ===== 移动止盈（回撤保护）=====
    trailing_stop_drawdown: -15.0
    trailing_stop_drawdown_core: -20.0
    trailing_stop_min_profit: 10.0
    # ===== 核心仓位 =====
    core_position_count: 3
    # ===== 时间止损 =====
    time_stop_days: 60
    time_stop_loss_pct: -5.0
    # ===== MA 趋势结构 =====
    ma_dead_cross_days: 3
    ma20_decline_lookback: 5
    ma20_decline_pct: 0.01
    # ===== ADX 趋势衰竭 =====
    adx_exhaustion_threshold: 18.0
    adx_decline_days: 5
    adx_decline_from_threshold: 30.0
    # ===== 得分恶化 =====
    score_drop_ratio: 0.55
    score_below_threshold: 50.0
    score_decline_days: 5
    score_decline_cumulative: 20.0
