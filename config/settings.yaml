    vol_diverge_vol_ratio: 0.6
    vol_diverge_severe_vol_ratio: 0.4
    vol_diverge_severe_price_pct: 8.0
    obv_divergence_lookback: 20
    crash_vol_ratio: 2.0
    crash_price_pct: -5.0
    # ===== 冷却期（按卖出原因区分）=====
    cooldown_stop_loss: 15
    cooldown_trend_deterioration: 20
    cooldown_score_drop: 20
    cooldown_trailing_stop: 15
    cooldown_volume_price: 15
    cooldown_momentum: 15
    cooldown_time_stop: 20
    cooldown_take_profit: 15
    cooldown_default: 15
