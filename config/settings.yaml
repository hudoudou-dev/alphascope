    enabled: false
    webhook_url: ''
    retry_times: 3
    timeout: 10
  feishu:
    enabled: false
    webhook_url: ''
    retry_times: 3
    timeout: 10
  retry:
    max_attempts: 3
    wait_multiplier: 1
    wait_min: 1
    wait_max: 10
logging:
  level: INFO
  format: json
  timezone: Asia/Shanghai
cache:
  redis:
    host: localhost
    port: 6379
    db: 0
  ttl:
    stock_list: 60
    stock_detail: 300
    strategy_config: 30
    selection_result: 300
